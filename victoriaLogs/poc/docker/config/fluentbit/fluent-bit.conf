# =============================================================================
# Fluent Bit Configuration - PoC for VictoriaLogs
# =============================================================================
# Simulates what runs as DaemonSet in EKS:
#   - Reads logs from fuzzy-train container
#   - Adds cluster/region/environment labels
#   - Pushes to VictoriaLogs via HTTP (jsonline)
# =============================================================================

[SERVICE]
    Flush         1
    Log_Level     info
    Daemon        off
    Parsers_File  /fluent-bit/etc/parsers.conf

# ---------------------------------------------------------------------------
# INPUT: Read logs from the shared volume (simulates container stdout)
# ---------------------------------------------------------------------------
[INPUT]
    Name          tail
    Path          /var/log/app/*.log
    Tag           app.logs
    Read_from_Head true
    Refresh_Interval 5

# Also capture flog's stdout via forward (Docker log driver)
[INPUT]
    Name          forward
    Listen        0.0.0.0
    Port          24224
    Tag           container.logs

# ---------------------------------------------------------------------------
# FILTER: Add cluster/region/environment metadata
# These labels distinguish logs from different EKS clusters in production
# ---------------------------------------------------------------------------
[FILTER]
    Name          record_modifier
    Match         *
    Record        cluster local-mac-poc
    Record        region us-east-1
    Record        environment poc
    Record        namespace default
    Record        service fuzzy-train

# ---------------------------------------------------------------------------
# OUTPUT: Push to VictoriaLogs
# _stream_fields defines what VL uses as log stream identifiers
# We include cluster, region, service, namespace to separate data per EKS cluster
# ---------------------------------------------------------------------------
[OUTPUT]
    Name          http
    Match         *
    Host          victorialogs
    Port          9428
    URI           /insert/jsonline?_stream_fields=cluster,region,service,namespace&_msg_field=log&_time_field=date
    Format        json_lines
    Json_date_format iso8601
    Retry_Limit   3

# ---------------------------------------------------------------------------
# OUTPUT: (Optional) Also write to stdout for debugging
# ---------------------------------------------------------------------------
[OUTPUT]
    Name          stdout
    Match         *
    Format        json_lines
