# =============================================================================
# AlertManager — Routes alerts to Teams + OpsGenie
# Chart: prometheus-community/alertmanager
# =============================================================================

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

config:
  global:
    resolve_timeout: 5m
    # OpsGenie global API key (use ExternalSecret or SealedSecret in production)
    opsgenie_api_key: "<OPSGENIE_API_KEY>"

  route:
    receiver: default
    group_by: ['alertname', 'service', 'cluster', 'region']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - match:
          severity: critical
        receiver: critical-opsgenie-and-teams
        continue: false
      - match:
          severity: warning
        receiver: warning-teams-only

  receivers:
    - name: default
      webhook_configs:
        - url: 'http://prometheus-msteams:2000/default'
          send_resolved: true

    - name: critical-opsgenie-and-teams
      opsgenie_configs:
        - api_key: "<OPSGENIE_API_KEY>"
          message: '{{ .GroupLabels.alertname }} | {{ .GroupLabels.service }} | {{ .GroupLabels.cluster }}'
          description: '{{ .CommonAnnotations.description }}'
          priority: 'P1'
          tags: '{{ .GroupLabels.cluster }},{{ .GroupLabels.region }},victorialogs'
          responders:
            - type: team
              name: 'SRE'
      webhook_configs:
        # prometheus-msteams adapter
        - url: 'http://prometheus-msteams:2000/critical-alerts'
          send_resolved: true

    - name: warning-teams-only
      webhook_configs:
        - url: 'http://prometheus-msteams:2000/warning-alerts'
          send_resolved: true

persistence:
  enabled: true
  storageClass: "gp3"
  size: 5Gi
