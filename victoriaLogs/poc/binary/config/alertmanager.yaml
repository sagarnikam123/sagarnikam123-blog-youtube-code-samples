# =============================================================================
# AlertManager Configuration — Binary PoC (local Mac)
# =============================================================================

global:
  resolve_timeout: 5m

route:
  receiver: default-receiver
  group_by: ['alertname', 'service', 'cluster']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: opsgenie-and-teams
    - match:
        severity: warning
      receiver: teams-only

receivers:
  - name: default-receiver
    webhook_configs:
      - url: 'http://localhost:5001/webhook'
        send_resolved: true

  - name: opsgenie-and-teams
    webhook_configs:
      - url: 'http://localhost:5001/webhook/opsgenie'
        send_resolved: true
      - url: 'http://localhost:5001/webhook/teams'
        send_resolved: true

  - name: teams-only
    webhook_configs:
      - url: 'http://localhost:5001/webhook/teams'
        send_resolved: true
