# =============================================================================
# Fluent Bit Configuration — Binary mode (local Mac)
# =============================================================================

[SERVICE]
    Flush         1
    Log_Level     info
    Daemon        off
    Parsers_File  ./config/parsers.conf

# ---------------------------------------------------------------------------
# INPUT: Read logs generated by flog / fuzzy-train
# ---------------------------------------------------------------------------
[INPUT]
    Name          tail
    Path          ./data/logs/*.log
    Tag           app.logs
    Read_from_Head true
    Refresh_Interval 5
    Parser        json

# ---------------------------------------------------------------------------
# FILTER: Add cluster/region/environment labels
# Simulates what the DaemonSet injects in EKS
# ---------------------------------------------------------------------------
[FILTER]
    Name          record_modifier
    Match         *
    Record        cluster local-mac-poc
    Record        region us-east-1
    Record        environment poc
    Record        namespace default
    Record        service fuzzy-train

# ---------------------------------------------------------------------------
# OUTPUT: Push to VictoriaLogs (running locally on port 9428)
# ---------------------------------------------------------------------------
[OUTPUT]
    Name          http
    Match         *
    Host          127.0.0.1
    Port          9428
    URI           /insert/jsonline?_stream_fields=cluster,region,service,namespace&_msg_field=log&_time_field=date
    Format        json_lines
    Json_date_format iso8601
    Retry_Limit   3
