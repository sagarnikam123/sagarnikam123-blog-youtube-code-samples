# -- Image
image:
  repository: fluent/fluent-bit
  tag: 5.0.1
  pullPolicy: IfNotPresent

# -- DaemonSet (default) or Deployment
kind: DaemonSet

# -- Increased resources to handle buffering and multiline parsing
# Production: requests cpu=200m memory=256Mi, limits cpu=500m memory=512Mi
# Minikube/dev: requests cpu=50m memory=64Mi, limits cpu=200m memory=128Mi
resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

# -- Volumes: varlog, docker containers, filesystem buffer storage, db
daemonSetVolumes:
  - name: varlog
    hostPath:
      path: /var/log
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers
  - name: flb-storage
    hostPath:
      path: /var/log/flb-storage/
      type: DirectoryOrCreate
  - name: flb-db
    hostPath:
      path: /var/log/flb_kube.db
      type: FileOrCreate

daemonSetVolumeMounts:
  - name: varlog
    mountPath: /var/log
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true
  - name: flb-storage
    mountPath: /var/log/flb-storage/
  - name: flb-db
    mountPath: /var/log/flb_kube.db

# -- Use external ConfigMap instead of inline config
# Create it first: kubectl create configmap fluent-bit-config \
#   --from-file=fluent-bit.yaml=fluent-bit.yaml -n fluent-bit
existingConfigMap: fluent-bit-config

# -- Override default args to point to fluent-bit.yaml instead of fluent-bit.conf
command:
  - /fluent-bit/bin/fluent-bit
args:
  - -c
  - /fluent-bit/etc/conf/fluent-bit.yaml

# -- Inline config disabled (managed via fluent-bit.yaml + configmap.yaml)
# config:

# -- Tolerations to run on all nodes including all tainted nodes (matches prod)
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
  - key: node-role.kubernetes.io/master
    operator: Exists
    effect: NoSchedule
  - operator: Exists
    effect: NoExecute
  - operator: Exists
    effect: NoSchedule

# -- Use host network for lower latency (matches prod)
hostNetwork: true
dnsPolicy: ClusterFirstWithHostNet

# -- Ensure fluent-bit is never evicted under node pressure
priorityClassName: system-node-critical

# -- Hot reload enabled via Helm chart (triggers SIGHUP on ConfigMap change)
hotReload:
  enabled: true

# -- ServiceMonitor for Prometheus (optional)
serviceMonitor:
  enabled: false

# -- Expose HTTP server port for hot reload API and metrics
service:
  type: ClusterIP
  port: 2020
  targetPort: 2020
