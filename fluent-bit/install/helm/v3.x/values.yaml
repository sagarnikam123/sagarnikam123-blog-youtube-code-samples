# -- Image
image:
  repository: fluent/fluent-bit
  tag: "3.0.4"
  pullPolicy: IfNotPresent

# -- DaemonSet (default) or Deployment
kind: DaemonSet

# -- Resource limits
resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi

# -- Fluent Bit config (classic .conf format for v3.x)
config:
  service: |
    [SERVICE]
        Flush         5
        Daemon        Off
        Log_Level     info
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020

  inputs: |
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        multiline.parser  docker, cri
        Tag               kube.*
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        Keep_Log            Off

  outputs: |
    [OUTPUT]
        Name   stdout
        Match  *

# -- Tolerations to run on all nodes including masters
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule

# -- ServiceMonitor for Prometheus (optional)
serviceMonitor:
  enabled: false
