# Deploys one pod per log format simultaneously
# Useful to test Fluent Bit parsing across all formats at once
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fuzzy-train-json
  namespace: fuzzy-train
  labels:
    app: fuzzy-train
    format: json
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fuzzy-train
      format: json
  template:
    metadata:
      labels:
        app: fuzzy-train
        format: json
    spec:
      containers:
        - name: fuzzy-train-json
          image: sagarnikam123/fuzzy-train:2.2.0
          args: ["--log-format", "JSON", "--lines-per-second", "2", "--time-zone", "UTC", "--output", "stdout"]
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits: {cpu: 100m, memory: 128Mi}
