# =============================================================================
# Webhook Configuration - Microsoft Teams
# =============================================================================
hooks:
  webhook:
    teams-alerts:
      is-default: true
      urls:
        # Microsoft Teams webhook URL — replace with your Power Automate webhook URL
        - <YOUR_POWER_AUTOMATE_WEBHOOK_URL>
