# =============================================================================
# SkyWalking Alarm Rules with Microsoft Teams Webhook
# =============================================================================
# Alarm rules for monitoring service health and performance
# Alerts are sent to Microsoft Teams via webhook
# =============================================================================

rules:
  # ---------------------------------------------------------------------------
  # Service Performance Rules
  # ---------------------------------------------------------------------------

  # Service average response time > 1s in last 3 minutes
  service_resp_time_rule:
    expression: sum(service_resp_time > 1000) >= 3
    period: 10
    silence-period: 10
    message: "Service {name} average response time is more than 1s in last 3 minutes."
    tags:
      level: WARNING

  # Service success rate < 80% in last 2 minutes
  service_sla_rule:
    expression: sum((service_sla / 100) < 80) >= 2
    period: 10
    silence-period: 10
    message: "Successful rate of service {name} is lower than 80% in last 2 minutes."
    tags:
      level: CRITICAL

  # Service response time percentile > 1s
  service_resp_time_percentile_rule:
    expression: sum(service_percentile{p='50,75,90,95,99'} > 1000) >= 3
    period: 10
    silence-period: 10
    message: "Percentile response time of service {name} alarm in 3 minutes of last 10 minutes."
    tags:
      level: WARNING

  # ---------------------------------------------------------------------------
  # Instance Performance Rules
  # ---------------------------------------------------------------------------

  # Service instance average response time > 1s in last 2 minutes
  service_instance_resp_time_rule:
    expression: sum(service_instance_resp_time > 1000) >= 2
    period: 10
    silence-period: 10
    message: "Service instance {name} average response time is more than 1s in last 2 minutes."
    tags:
      level: WARNING

  # ---------------------------------------------------------------------------
  # Endpoint Performance Rules
  # ---------------------------------------------------------------------------

  # Endpoint average response time > 1s in last 2 minutes
  endpoint_resp_time_rule:
    expression: sum(endpoint_resp_time > 1000) >= 2
    period: 10
    silence-period: 10
    message: "Endpoint {name} average response time is more than 1s in last 2 minutes."
    tags:
      level: WARNING

  # ---------------------------------------------------------------------------
  # Database Performance Rules
  # ---------------------------------------------------------------------------

  # Database access average response time > 1s in last 2 minutes
  database_access_resp_time_rule:
    expression: sum(database_access_resp_time > 1000) >= 2
    period: 10
    silence-period: 10
    message: "Database access {name} average response time is more than 1s in last 2 minutes."
    tags:
      level: WARNING

  # ---------------------------------------------------------------------------
  # Endpoint Relation Rules
  # ---------------------------------------------------------------------------

  # Endpoint relation average response time > 1s in last 2 minutes
  endpoint_relation_resp_time_rule:
    expression: sum(endpoint_relation_resp_time > 1000) >= 2
    period: 10
    silence-period: 10
    message: "Endpoint relation {name} average response time is more than 1s in last 2 minutes."
    tags:
      level: WARNING

  # ---------------------------------------------------------------------------
  # Log Error Rules - TEMPORARILY DISABLED
  # ---------------------------------------------------------------------------
  # These rules are commented out to allow OAP to start successfully.
  # Once OAP is running and LAL/MAL are generating metrics, we'll verify
  # the actual metric names and re-enable these rules.
  # ---------------------------------------------------------------------------

