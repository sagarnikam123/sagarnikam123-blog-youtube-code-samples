# =============================================================================
# Apache SkyWalking - Complete Docker Standalone Setup
# =============================================================================
# Single-node deployment with BanyanDB storage, fuzzy-train log generators,
# Teams webhook alerting, and sample monitoring services
#
# Usage:
#   docker compose up -d
#
# Access:
#   - SkyWalking UI:    http://localhost:8080
#   - OAP HTTP API:     http://localhost:12800
#   - OAP gRPC:         localhost:11800
#   - OAP Metrics:      http://localhost:1234/metrics
#   - BanyanDB Health:  http://localhost:17913/api/healthz
#
# Fuzzy-Train Log Generators:
#   - fuzzy-train-python (1 log/sec)
#   - fuzzy-train-java (1 log/sec)
#
# View logs in SkyWalking UI:
#   1. Select "General Service" layer
#   2. Find services: fuzzy-train-python, fuzzy-train-java
#   3. Go to "Log" tab
# =============================================================================

services:
  # ==========================================================================
  # CORE SERVICES
  # ==========================================================================

  # --------------------------------------------------------------------------
  # BanyanDB Storage Backend
  # --------------------------------------------------------------------------
  banyandb:
    image: apache/skywalking-banyandb:0.9.0
    container_name: skywalking-banyandb
    restart: unless-stopped
    ports:
      - "17912:17912"
      - "17913:17913"
      - "2121:2121"
    volumes:
      - banyandb-data:/data
    command:
      - standalone
      - --metadata-root-path=/data
      - --measure-root-path=/data
      - --stream-root-path=/data
      - --property-root-path=/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:17913/api/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - skywalking

  # --------------------------------------------------------------------------
  # SkyWalking OAP Server with Teams Webhook Alerting
  # --------------------------------------------------------------------------
  oap:
    image: apache/skywalking-oap-server:10.3.0
    container_name: skywalking-oap
    restart: unless-stopped
    depends_on:
      banyandb:
        condition: service_healthy
    ports:
      - "11800:11800"
      - "12800:12800"
      - "1234:1234"
    environment:
      SW_STORAGE: banyandb
      SW_STORAGE_BANYANDB_TARGETS: banyandb:17912
      SW_HEALTH_CHECKER: default
      # Self-observability - expose Prometheus metrics
      SW_TELEMETRY: prometheus
      SW_TELEMETRY_PROMETHEUS_HOST: 0.0.0.0
      SW_TELEMETRY_PROMETHEUS_PORT: 1234
      # OpenTelemetry Receiver
      SW_OTEL_RECEIVER: default
      SW_OTEL_RECEIVER_ENABLED_HANDLERS: otlp-metrics,otlp-logs,otlp-traces
      # Enable OTel rules for all services
      SW_OTEL_RECEIVER_ENABLED_OC_RULES: oap,vm,mysql,postgresql,redis,mongodb,elasticsearch,kafka,rabbitmq,nginx
      # Data retention
      SW_CORE_RECORD_DATA_TTL: 3
      SW_CORE_METRICS_DATA_TTL: 7
      # Searchable tags
      SW_SEARCHABLE_TAG_KEYS: http.method,http.status_code,rpc.status_code,db.type,db.instance,mq.queue,mq.topic
      SW_SEARCHABLE_LOGS_TAG_KEYS: level,logger,thread
      SW_SEARCHABLE_ALARM_TAG_KEYS: level,service,endpoint
      # JVM settings
      JAVA_OPTS: "-Xms512m -Xmx1024m"
    volumes:
      - ./config/alarm-settings.yml:/skywalking/config/alarm-settings.yml:ro
      - ./ui-init-templates/menu.yaml:/skywalking/config/ui-initialized-templates/menu.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:12800/healthcheck"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 180s
    networks:
      - skywalking

  # --------------------------------------------------------------------------
  # SkyWalking UI
  # --------------------------------------------------------------------------
  ui:
    image: apache/skywalking-ui:10.3.0
    container_name: skywalking-ui
    restart: unless-stopped
    depends_on:
      oap:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SW_OAP_ADDRESS: http://oap:12800
    networks:
      - skywalking

  # ==========================================================================
  # FUZZY-TRAIN LOG GENERATORS
  # ==========================================================================

  # --------------------------------------------------------------------------
  # Python Log Generator
  # --------------------------------------------------------------------------
  fuzzy-train-python:
    image: sagarnikam123/fuzzy-train-skywalking-python:latest
    container_name: fuzzy-train-python
    restart: unless-stopped
    depends_on:
      oap:
        condition: service_healthy
    command:
      - "--lines-per-second"
      - "1"
    environment:
      SW_AGENT_NAME: fuzzy-train-python
      SW_AGENT_COLLECTOR_BACKEND_SERVICES: oap:11800
      SW_AGENT_LOG_REPORTER_ACTIVE: "true"
    networks:
      - skywalking

  # --------------------------------------------------------------------------
  # Java Log Generator
  # --------------------------------------------------------------------------
  fuzzy-train-java:
    image: sagarnikam123/fuzzy-train-skywalking-java:latest
    container_name: fuzzy-train-java
    restart: unless-stopped
    depends_on:
      oap:
        condition: service_healthy
    command:
      - "--lines-per-second"
      - "1"
    environment:
      SW_AGENT_NAME: fuzzy-train-java
      SW_AGENT_COLLECTOR_BACKEND_SERVICES: oap:11800
      SW_GRPC_LOG_SERVER_HOST: oap
      SW_GRPC_LOG_SERVER_PORT: "11800"
      # Java 21 ByteBuddy fix
      JDK_JAVA_OPTIONS: "-Dorg.apache.skywalking.apm.dependencies.net.bytebuddy.experimental=true"
    networks:
      - skywalking

  # ==========================================================================
  # OPENTELEMETRY COLLECTOR
  # ==========================================================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: skywalking-otel-collector
    restart: unless-stopped
    depends_on:
      oap:
        condition: service_healthy
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    networks:
      - skywalking

  # ==========================================================================
  # DATABASE MONITORING EXPORTERS
  # ==========================================================================

  mysqld-exporter:
    image: prom/mysqld-exporter:v0.16.0
    container_name: skywalking-mysqld-exporter
    restart: unless-stopped
    depends_on:
      sample-mysql:
        condition: service_healthy
    environment:
      MYSQLD_EXPORTER_PASSWORD: exporterpassword
    command:
      - --mysqld.address=sample-mysql:3306
      - --mysqld.username=exporter
    networks:
      - skywalking

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.0
    container_name: skywalking-postgres-exporter
    restart: unless-stopped
    depends_on:
      sample-postgresql:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@sample-postgresql:5432/postgres?sslmode=disable"
    networks:
      - skywalking

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    container_name: skywalking-redis-exporter
    restart: unless-stopped
    depends_on:
      sample-redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: sample-redis:6379
    networks:
      - skywalking

  mongodb-exporter:
    image: percona/mongodb_exporter:0.44.0
    container_name: skywalking-mongodb-exporter
    restart: unless-stopped
    depends_on:
      sample-mongodb:
        condition: service_healthy
    command:
      - --mongodb.uri=mongodb://sample-mongodb:27017
      - --collect-all
      - --discovering-mode
    networks:
      - skywalking

  elasticsearch-exporter:
    image: quay.io/prometheuscommunity/elasticsearch-exporter:v1.9.0
    container_name: skywalking-elasticsearch-exporter
    restart: unless-stopped
    depends_on:
      sample-elasticsearch:
        condition: service_healthy
    command:
      - --es.uri=http://sample-elasticsearch:9200
      - --es.all
    networks:
      - skywalking

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.4.1
    container_name: skywalking-nginx-exporter
    restart: unless-stopped
    depends_on:
      - sample-nginx
    command:
      - -nginx.scrape-uri=http://sample-nginx:80/nginx_status
    networks:
      - skywalking

  # ==========================================================================
  # SAMPLE SERVICES (For Testing/Demo)
  # ==========================================================================

  sample-mysql:
    image: mysql:8.0
    container_name: sample-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: testdb
      MYSQL_USER: exporter
      MYSQL_PASSWORD: exporterpassword
    ports:
      - "3307:3306"
    volumes:
      - sample-mysql-data:/var/lib/mysql
      - ./examples/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: [--character-set-server=utf8mb4, --collation-server=utf8mb4_unicode_ci]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skywalking

  sample-postgresql:
    image: postgres:17-alpine
    container_name: sample-postgresql
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: testdb
    ports:
      - "5433:5432"
    volumes:
      - sample-postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skywalking

  sample-redis:
    image: redis:7-alpine
    container_name: sample-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - sample-redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skywalking

  sample-mongodb:
    image: mongo:8
    container_name: sample-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - sample-mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - skywalking

  sample-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.3
    container_name: sample-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - sample-elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - skywalking

  sample-nginx:
    image: nginx:1.27-alpine
    container_name: sample-nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./examples/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - skywalking

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  skywalking:
    driver: bridge

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  banyandb-data:
  sample-mysql-data:
  sample-postgresql-data:
  sample-redis-data:
  sample-mongodb-data:
  sample-elasticsearch-data:
