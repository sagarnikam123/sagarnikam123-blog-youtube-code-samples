# All Persistent Volume Claims for SkyWalking Cluster - AWS EKS Environment
# This file contains all PVC definitions for quick deployment in AWS EKS
#
# Usage:
#   kubectl apply -f all-pvcs-eks.yaml
#
# Note: These are example PVCs for manual pre-provisioning.
# When using StatefulSets, PVCs are automatically created from volumeClaimTemplates.

---
# BanyanDB Data Node 0 - Stream Data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stream-data-banyandb-data-0
  namespace: skywalking
  labels:
    app: banyandb
    component: data
    data-type: stream
    replica: "0"
spec:
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  storageClassName: gp3
  resources:
    requests:
      storage: 50Gi

---
