---
# Summary for AWS EKS Environment:
# - 3 BanyanDB data nodes × 2 volumes (stream + measure) = 6 PVCs × 50Gi = 300Gi
# - 3 etcd nodes × 1 volume = 3 PVCs × 10Gi = 30Gi
# - Total: 9 PVCs, 330Gi storage
#
# Prerequisites:
# 1. EKS cluster with nodes in at least 3 availability zones
#
# 2. EBS CSI driver installed:
#    kubectl get pods -n kube-system | grep ebs-csi
#
# 3. GP3 storage class created:
#    kubectl apply -f ../storage-class.yaml
#    kubectl get storageclass gp3
#
# 4. Namespace created:
#    kubectl create namespace skywalking
#
# 5. Sufficient EBS volume quota in AWS account
#
# Verification:
#   kubectl get pvc -n skywalking
#   kubectl describe pvc -n skywalking
#
# Cost Estimate (us-east-1):
#   - BanyanDB storage: 300Gi × $0.08/GB/month = $24/month
#   - etcd storage: 30Gi × $0.08/GB/month = $2.40/month
#   - Total: ~$26.40/month for storage
#
# Performance:
#   - GP3 baseline: 3000 IOPS, 125 MB/s per volume
#   - Total baseline: 27,000 IOPS, 1,125 MB/s
#   - Can be increased in storage class if needed
