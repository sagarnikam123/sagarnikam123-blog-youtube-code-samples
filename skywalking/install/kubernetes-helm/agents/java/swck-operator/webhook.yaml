# =============================================================================
# Mutating Webhook Configuration for Java Agent Injection
# =============================================================================
# This webhook intercepts pod creation and injects the SkyWalking agent
# when namespace has label: swck-injection=enabled
#
# Note: SWCK uses 'swck-injection' label (not 'skywalking-injection')
# =============================================================================

apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: skywalking-swck-mutating-webhook-configuration
  labels:
    app.kubernetes.io/name: skywalking-swck
  annotations:
    cert-manager.io/inject-ca-from: skywalking-swck-system/skywalking-swck-serving-cert
webhooks:
  - name: mpod.kb.io
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: skywalking-swck-controller-manager-service
        namespace: skywalking-swck-system
        path: /mutate-v1-pod
        port: 443
    failurePolicy: Ignore
    matchPolicy: Equivalent
    reinvocationPolicy: Never
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
        scope: Namespaced
    namespaceSelector:
      matchLabels:
        swck-injection: enabled
    sideEffects: None
    timeoutSeconds: 10
