[pytest]
# Pytest configuration for SkyWalking property-based tests

# Test discovery patterns
python_files = test_*.py property_test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers for test categorization
markers =
    property: Property-based tests using Hypothesis
    unit: Unit tests for specific scenarios
    integration: Integration tests requiring cluster
    slow: Tests that take significant time to run
    minikube: Tests specific to Minikube environment
    eks: Tests specific to EKS environment

# Test paths
testpaths = .

# Hypothesis settings
hypothesis_profile = default

[hypothesis]
# Default profile for property-based tests
max_examples = 100
deadline = None
verbosity = normal
